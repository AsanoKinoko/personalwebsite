<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Vector Shapes</title>
</head>
<body>
    <main>
        <h2>Draw Vector Shapes</h2>

        <figure>
            <img src="my_learning/figma/draw-vector-shapes-and-pen-tool/draw-vector-shapes/images/draw-vector-shapes.png" alt="Rectangle, Line, Arrow, Ellipse, Polygon, Star, Image/video..." loading="lazy">
        </figure>

        <p>Rectangle: R</p>
        <p>Line: L</p>
        <p>Arrow: Shift + L</p>
        <p>Ellipse: O</p>
        <p>Place Image (Đưa ảnh vào): Ctrl + Shift + K</p>
    </main>
