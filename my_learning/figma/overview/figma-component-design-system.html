<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component (Design System)</title>
</head>
<body>
    <main>
        <h2>Component (Design System)</h2>
        <p>Component = UI tái sử dụng.</p>
        <p>Ví dụ:</p>
        <ul>
            <li>Button</li>
            <li>Card</li>
            <li>Navbar</li>
            <li>Input</li>
        </ul>
        <p>Có 2 loại:</p>
        <ul>
            <li><strong>Main Component</strong>: Component gốc.</li>
            <li><strong>Instance</strong>: Bản copy của component.</li>
        </ul>
        <p>Nếu sửa main component → tất cả instance update.</p>
    </main>
</body>
</html>
