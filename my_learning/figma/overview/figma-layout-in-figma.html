<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout trong Figma</title>
</head>
<body>
    <main>
        <h2>Layout trong Figma</h2>

        <h3>3.1 Auto Layout (rất quan trọng)</h3>
        <p>Auto Layout giúp:</p>
        <ul>
            <li>UI co giãn</li>
            <li>responsive layout</li>
            <li>spacing tự động</li>
        </ul>
        <p>Ví dụ:</p>
        <pre><code>Button
[icon]  [text]
Khi text dài hơn → button tự giãn.</code></pre>

        <h3>3.2 Constraints</h3>
        <p>Xác định khi frame resize thì element:</p>
        <ul>
            <li>bám trái</li>
            <li>bám phải</li>
            <li>bám center</li>
        </ul>
    </main>
</body>
</html>
