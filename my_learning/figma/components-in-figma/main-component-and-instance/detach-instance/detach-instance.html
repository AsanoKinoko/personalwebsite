    <main>
        <div class="figma-article">
            <h3>Detach Instance</h3>

            <p>Để detach một instance, bạn click chuột phải → <strong>Detach instance</strong> hoặc bấm <strong>Ctrl + Alt + B</strong>.</p>

            <figure class="img-frame">
                <img src="my_learning/figma/components-in-figma/main-component-and-instance/detach-instance/images/detach-instance.png" alt="Detach instance (right click menu)" loading="lazy">
            </figure>

            <p>Instance trở thành layer bình thường và mất liên kết với component.</p>

            <p><strong>Dùng khi</strong>:</p>
            <ul>
                <li>cần chỉnh sửa hoàn toàn custom</li>
                <li>không muốn update theo main nữa</li>
            </ul>
        </div>
    </main>
