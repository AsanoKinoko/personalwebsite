<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move, Scale, Frame và Slice Tool • Figma</title>
</head>
<body>
    <main>
        <h2>Move, Scale, Frame và Slice Tool</h2>

        <h3>Nội dung</h3>
        <ul>
            <li><strong><a href="?tag=figma&topic=figma-tools-move-scale" data-topic-link="figma-tools-move-scale">1. Nhóm công cụ Move và Scale</a></strong></li>
            <li><strong><a href="?tag=figma&topic=figma-tools-frame-section-slice" data-topic-link="figma-tools-frame-section-slice">2. Nhóm công cụ Hand tool và Slice</a></strong></li>
            <li><strong><a href="?tag=figma&topic=figma-tools-export" data-topic-link="figma-tools-export">3. Export</a></strong></li>
            <li><strong><a href="?tag=figma&topic=figma-tools-frame-group-component" data-topic-link="figma-tools-frame-group-component">4. Sự khác nhau giữa Frame, Group và Component</a></strong></li>
        </ul>
    </main>

    <script>
        (function() {
            const links = document.querySelectorAll('a[data-topic-link]');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const topicId = this.getAttribute('data-topic-link');
                    const targetWindow = window.top || window.parent || window;
                    if (targetWindow.selectTopic && typeof targetWindow.selectTopic === 'function') {
                        targetWindow.selectTopic(topicId);
                    } else {
                        const currentUrl = new URL(targetWindow.location.href);
                        currentUrl.searchParams.set('tag', 'figma');
                        currentUrl.searchParams.set('topic', topicId);
                        targetWindow.location.href = currentUrl.toString();
                    }
                });
            });
        })();
    </script>
</body>
</html>
